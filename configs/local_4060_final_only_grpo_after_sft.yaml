seed: 42
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
adapter_path: outputs/local_4060_format_sft_warmup
model:
  torch_dtype: float16
dataset:
  name: openai/gsm8k
  config: main
  split: train
  limit: 128
  prompt_style: final_only
output_dir: outputs/local_4060_final_only_grpo_after_sft
training:
  max_steps: 20
  learning_rate: 0.000005
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_generations: 4
  max_prompt_length: 512
  max_completion_length: 48
  temperature: 0.8
  top_p: 0.95
  logging_steps: 1
  save_steps: 20
  bf16: false
  fp16: true
  gradient_checkpointing: true
  use_vllm: false
  beta: 0.0
  loss_type: dr_grpo
rewards:
  correctness_weight: 2.0
  format_weight: 0.0
  final_line_weight: 0.5
  trailing_penalty_weight: 1.0
