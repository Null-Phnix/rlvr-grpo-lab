seed: 47
model_name_or_path: Qwen/Qwen2.5-3B-Instruct
adapter_path: outputs/cloud_3b_boundary_sft_warmup
model:
  torch_dtype: bfloat16
dataset:
  name: openai/gsm8k
  config: main
  split: train
  limit: 512
  prompt_style: strict_final_line
output_dir: outputs/cloud_3b_boundary_sft_cleanup_grpo
training:
  max_steps: 40
  learning_rate: 0.000002
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_generations: 4
  max_prompt_length: 512
  max_completion_length: 256
  temperature: 0.8
  top_p: 0.95
  logging_steps: 2
  save_steps: 20
  bf16: true
  fp16: false
  gradient_checkpointing: true
  use_vllm: false
  beta: 0.0
  loss_type: dr_grpo
rewards:
  correctness_weight: 3.0
  marker_correctness_weight: 1.0
  contract_progress_weight: 0.5
  final_line_correctness_weight: 1.0
  format_weight: 0.0
  final_line_weight: 0.3
  trailing_penalty_weight: 0.6
  conversation_leak_penalty_weight: 0.3
