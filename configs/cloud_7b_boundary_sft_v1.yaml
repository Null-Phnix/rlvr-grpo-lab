seed: 49
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
model:
  torch_dtype: bfloat16
dataset:
  source: samples_jsonl
  path: outputs/datasets/cloud_7b_boundary_sft_train2048.jsonl
output_dir: outputs/cloud_7b_boundary_sft_v1
training:
  max_steps: 200
  learning_rate: 0.00001
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length: 1024
  logging_steps: 5
  save_steps: 100
  bf16: true
  fp16: false
  gradient_checkpointing: true
lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
