seed: 50
model_name_or_path: Qwen/Qwen2.5-3B-Instruct
model:
  torch_dtype: bfloat16
dataset:
  source: samples_jsonl
  path: outputs/datasets/cloud_3b_boundary_sft_train2048_source_finalline.jsonl
output_dir: outputs/cloud_3b_boundary_sft_v4_source_finalline
training:
  max_steps: 60
  learning_rate: 0.00002
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  max_seq_length: 1024
  logging_steps: 5
  save_steps: 60
  bf16: true
  fp16: false
  gradient_checkpointing: true
lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
