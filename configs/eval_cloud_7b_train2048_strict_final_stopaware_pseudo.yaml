model_name_or_path: Qwen/Qwen2.5-7B-Instruct
model:
  torch_dtype: bfloat16
  device_map: auto
dataset:
  name: openai/gsm8k
  config: main
  split: train
  limit: 2048
  prompt_style: strict_final_line
generation:
  batch_size: 2
  max_prompt_length: 512
  max_new_tokens: 384
  do_sample: false
  postprocess:
    truncate_after_final_marker: true
    stop_sequences:
      - "\nHuman:"
      - "\nUser:"
      - "\nSystem:"
      - "\nAssistant:"
      - "\nProblem:"
output_dir: outputs/evals/cloud_7b_train2048_strict_final_stopaware_pseudo
