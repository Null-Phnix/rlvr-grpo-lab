model_name_or_path: Qwen/Qwen2.5-3B-Instruct
model:
  torch_dtype: float16
  device_map: auto
dataset:
  name: openai/gsm8k
  config: main
  split: test
  limit: 16
  prompt_style: minimal_final_line
generation:
  batch_size: 1
  max_prompt_length: 512
  max_new_tokens: 256
  do_sample: false
  postprocess:
    truncate_after_final_marker: true
    stop_sequences:
      - "\nHuman:"
      - "\nUser:"
      - "\nSystem:"
      - "\nAssistant:"
      - "\nProblem:"
output_dir: outputs/evals/phnixbox_3b_minimal_final_stopaware_smoke
