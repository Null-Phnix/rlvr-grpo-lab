seed: 42
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
dataset:
  name: openai/gsm8k
  config: main
  split: train
  limit: 128
  prompt_style: strict_final_line
output_dir: outputs/local_4060_strict_final_smoke
training:
  max_steps: 12
  learning_rate: 0.000005
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_generations: 2
  max_prompt_length: 512
  max_completion_length: 160
  temperature: 0.8
  top_p: 0.95
  logging_steps: 1
  save_steps: 12
  bf16: false
  fp16: true
  gradient_checkpointing: true
  use_vllm: false
  beta: 0.0
  loss_type: dr_grpo
lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
rewards:
  correctness_weight: 1.0
  format_weight: 0.25
  final_line_weight: 2.0
  trailing_penalty_weight: 1.0
